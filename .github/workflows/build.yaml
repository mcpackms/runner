name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create libs directory and download Xposed API
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/api-82.jar "https://github.com/rovo89/XposedBridge/raw/master/app/src/main/assets/XposedBridge-api-82.jar" || \
        echo "Warning: Failed to download, please check if file exists manually"
    
    - name: Grant execute permission for gradlew
      run: |
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk