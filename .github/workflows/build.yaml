name: Build and Upload

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - run: gradle wrapper
      - run: chmod +x gradlew
      - run: ./gradlew build --no-daemon
      
      - name: Create tar.zst archive
        run: |
          # 收集并压缩所有构建产物
          tar -c --use-compress-program="zstd -T0 -10" \
            -f build-outputs.tar.zst \
            app/build/outputs/ \
            module/build/outputs/ \
            **/build/libs/ \
            2>/dev/null || true
      
      - uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build-outputs.tar.zst
          compression-level: 0