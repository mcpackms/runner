name: Build and Cache

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Gradle（禁用缓存避免服务端错误）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true  # 禁用缓存

      # 4. 生成 Gradle Wrapper
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      # 5. 赋予执行权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 6. 构建项目
      - name: Build project
        run: ./gradlew build --no-daemon

      # 7. 收集构建产物
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          # 复制所有构建产物
          find . -path "*/build/outputs/*" -type f -exec cp --parents {} artifacts/ \;
          find . -path "*/build/libs/*" -type f -exec cp --parents {} artifacts/ \;
          find . -path "*/build/reports/*" -type f -exec cp --parents {} artifacts/ \;

      # 8. 压缩为 tar.zst
      - name: Compress with tar.zst
        run: |
          tar -c --use-compress-program="zstd -T0 -10" \
            -f build-artifacts.tar.zst \
            artifacts/

      # 9. 上传压缩包
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.zst
          compression-level: 0
          retention-days: 90

      # 10. 可选：单独上传 APK（方便直接下载）
      - name: Upload APK files
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: warn