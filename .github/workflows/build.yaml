name: Build, Cache and Upload

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Gradle 并自动缓存依赖
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      # 4. 生成 Gradle Wrapper
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      # 5. 赋予执行权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 6. 使用 Gradle 构建
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 7. 使用 Gradle 打包产物（如果项目有自定义任务）
      # 或者直接压缩 Gradle 生成的输出目录
      - name: Prepare artifacts
        run: |
          # 创建产物目录
          mkdir -p artifacts
          
          # 使用 Gradle 的依赖任务复制产物（推荐）
          ./gradlew copyArtifacts -PoutputDir=artifacts || \
          # 备选：直接复制 Gradle 生成的产物
          cp -r app/build/outputs artifacts/ 2>/dev/null || true
          cp -r module/build/outputs artifacts/ 2>/dev/null || true
          cp -r app/build/libs artifacts/ 2>/dev/null || true
          cp -r module/build/libs artifacts/ 2>/dev/null || true

      # 8. 压缩为 tar.zst
      - name: Compress with tar.zst
        run: |
          tar -c --use-compress-program="zstd -T0 -10" \
            -f build-artifacts.tar.zst \
            artifacts/

      # 9. 上传压缩包
      - name: Upload compressed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.zst
          compression-level: 0
          retention-days: 90